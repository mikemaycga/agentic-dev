site_name: Agentic Development Environment
site_description: Production-grade AI agent governance framework built on Anthropic's Claude
site_author: Mike May
copyright: Copyright &copy; 2026 Mike May

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/mikemaycga/agentic-dev
repo_name: mikemaycga/agentic-dev

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mikemaycga

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/overview.md
    - Setup Guide: getting-started/setup.md
    - Cross-Machine Sync: getting-started/cross-machine-sync.md
  - Architecture:
    - System Overview: architecture/system-overview.md
    - Agent Architecture: architecture/agent-architecture.md
    - Decisions:
      - ADR-001 Sync Strategy: architecture/decisions/ADR-001-sync-strategy.md
      - ADR-002 Agent Architecture: architecture/decisions/ADR-002-agent-architecture.md
      - ADR-003 Document Formats: architecture/decisions/ADR-003-document-formats.md
      - ADR-004 Skill Building: architecture/decisions/ADR-004-skill-building.md
      - ADR-005 RSP Integration: architecture/decisions/ADR-005-rsp-v3-integration.md
      - ADR-006 Safe AI Governance: architecture/decisions/ADR-006-safe-ai-governance.md
      - ADR-007 Project Complexity: architecture/decisions/ADR-007-project-complexity-classification.md
  - Governance:
    - Safe AI Governance: governance/safe-ai-governance.md
    - Security Baseline: governance/security-baseline.md
    - RSP v3.0 Alignment: governance/rsp-alignment.md
    - Security Profiles: governance/security-profiles.md
  - Standards:
    - Project Complexity: standards/project-complexity.md
    - Code Style: standards/code-style.md
    - Testing: standards/testing.md
    - Git Workflow: standards/git-workflow.md
    - Documentation: standards/documentation.md
    - Skill Building: standards/skill-building.md
  - Agents:
    - Agent Roster: agents/roster.md
    - Larry (Orchestrator): agents/larry.md
    - Architect: agents/architect.md
    - Sentinel (Security): agents/sentinel.md
    - Specialists: agents/specialists.md
  - Skills:
    - Skill Catalog: skills/catalog.md
    - Self-Improving Skills: skills/self-improving.md
